
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>MoneyMap</title>
      <script>
        try {
          const theme = window.localStorage.getItem('financeHub_theme');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else if (theme === null) {
            window.localStorage.setItem('financeHub_theme', 'dark');
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          // Ignore if localStorage is unavailable
        }
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.jsx"></script>
    </body>
  </html>
